services:
  - type: web
    name: tumour-detector-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false          # Set via Render dashboard (secret)
      - key: MONGODB_DB
        value: tumour_detector
      - key: ML_SERVICE_URL
        sync: false          # Set via Render dashboard
      - key: CORS_ORIGINS
        sync: false
